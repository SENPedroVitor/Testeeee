<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Para você...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 15, 26, 0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: opacity 0.6s ease;
        }

        #cover-content {
            font-size: 1.5rem;
            padding: 30px;
            line-height: 1.6;
            max-width: 80%;
        }

        #cover-hint {
            margin-top: 30px;
            font-size: 0.95rem;
            opacity: 0.7;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.2; }
        }

        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 1;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(-30px, -30px) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.1); }
        }

        .petals {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            top: -20px;
            width: 12px;
            height: 12px;
            background: #ffb6c1;
            border-radius: 12px 2px 12px 2px;
            box-shadow: 0 0 8px rgba(255,182,193,0.6);
            /* Animações vão ser definidas via javascript inline na div */
            animation-name: fall, sway, spin;
            animation-iteration-count: infinite;
            animation-timing-function: linear, ease-in-out, linear;
            animation-direction: normal, alternate, normal;
        }

        @keyframes fall {
            to { top: 110vh; }
        }

        @keyframes sway {
            from { transform: translateX(-30px); }
            to { transform: translateX(30px); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stage {
            position: relative;
            z-index: 10;
            width: 85vw;
            max-width: 450px;
            height: 65vh;
            max-height: 600px;
            perspective: 1000px;
        }

        .card-container {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer;
        }

        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(25, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 10px rgba(255,255,255,0.05);
            opacity: 0;
            pointer-events: none;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(40px) scale(0.9);
        }

        .card.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        .card.hidden {
            opacity: 0;
            transform: translateY(40px) scale(0.9);
        }

        .card.exit {
            opacity: 0;
            transform: translateY(-40px) scale(1.05);
        }

        .card .text {
            font-size: 1.5rem;
            font-style: italic;
            line-height: 1.5;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .card img {
            max-width: 100%;
            max-height: 85%;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            object-fit: contain;
        }

        .hint {
            position: absolute;
            bottom: 25px;
            font-size: 0.85rem;
            opacity: 0.6;
            animation: blink 2s infinite;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="cover" onclick="nextCard()">
        <div id="cover-content">
            Má, eu sei que você tá de mal comigo,<br />mas saiba que eu sempre vou ser seu maior fã nesse mundo inteiro
            <div id="cover-hint">toca pra continuar</div>
        </div>
    </div>

    <div class="glow"></div>
    <div class="petals" id="petals"></div>

    <div class="stage">
        <div class="card-container" id="deck" onclick="nextCard()"></div>
    </div>

    <script>
        const cardsData = [
            { type: 'text', content: 'eu até pensei em mandar uma cantada pra essa foto...' },
            { type: 'text', content: 'mas percebi que nenhuma ia chegar nem perto do que eu realmente sinto por você' },
            { type: 'text', content: 'porque a verdade é que eu não quero só te impressionar...' },
            { type: 'text', content: 'eu quero te conquistar todo dia, como se fosse sempre a primeira vez' },
            { type: 'text', content: 'e no meio disso tudo, tem as nossas piadas que só a gente entende...' },
            { type: 'text', content: 'tipo eu falar que criaria a dengue só pra ter uma desculpa pra te ver' },
            { type: 'text', content: 'mas a verdade mesmo é bem mais simples' },
            { type: 'text', content: 'eu sou completamente apaixonado por você' },
            { type: 'text', content: "cause after all, you're my wonderwall..." },
            { type: 'image', content: 'imagem.jpg' }
        ];

        let currentIndex = 0;
        const deck = document.getElementById('deck');
        const petals = document.getElementById('petals');

        function createCard(index) {
            const cardDiv = document.createElement('div');
            cardDiv.className = `card ${index === 0 ? 'active' : 'hidden'}`;
            cardDiv.id = `card-${index}`;

            const item = cardsData[index];
            const inner = item.type === 'text'
                ? `<div class="text">${item.content}</div>`
                : `<img src="${item.content}" alt="final" />`;

            const hintHtml = index === cardsData.length - 1
                ? ''
                : '<div class="hint">toca na tela pra passar</div>';

            cardDiv.innerHTML = `${inner}${hintHtml}`;
            return cardDiv;
        }

        function createPetals() {
            const petalCount = 25;
            petals.innerHTML = '';

            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('span');
                petal.className = 'petal';
                petal.style.left = `${Math.random() * 100}%`;

                const fallDuration = 8 + Math.random() * 6;
                const swayDuration = 3 + Math.random() * 2;
                const spinDuration = 6 + Math.random() * 4;

                petal.style.animationDuration = `${fallDuration}s, ${swayDuration}s, ${spinDuration}s`;
                petal.style.animationDelay = `${Math.random() * 5}s, ${Math.random() * 2}s, ${Math.random() * 3}s`;
                petal.style.opacity = `${0.45 + Math.random() * 0.45}`;
                petal.style.transform = `scale(${0.7 + Math.random() * 0.9})`;

                petals.appendChild(petal);
            }
        }

        function runBasicChecks() {
            console.assert(Array.isArray(cardsData), 'cardsData precisa ser um array');
            console.assert(cardsData.length > 0, 'cardsData não pode estar vazio');
            console.assert(cardsData[cardsData.length - 1].type === 'image', 'o último card deve ser a imagem final');
            console.assert(document.getElementById('deck'), 'deck precisa existir');
            console.assert(document.getElementById('petals'), 'petals precisa existir');
        }

        cardsData.forEach((_, i) => deck.appendChild(createCard(i)));
        createPetals();
        runBasicChecks();

        function nextCard() {
            const cover = document.getElementById('cover');

            if (cover) {
                cover.style.opacity = '0';
                cover.style.pointerEvents = 'none';
                setTimeout(() => cover.remove(), 600);
                return;
            }

            if (currentIndex >= cardsData.length - 1) return;

            const currentCard = document.getElementById(`card-${currentIndex}`);
            const nextCardObj = document.getElementById(`card-${currentIndex + 1}`);

            if (!currentCard || !nextCardObj) return;

            currentCard.classList.remove('active');
            currentCard.classList.add('exit');

            nextCardObj.classList.remove('hidden');
            nextCardObj.classList.add('active');

            currentIndex++;
        }
    </script>
</body>
</html>
